description = "Initialize a new feature development workflow (Phase 1: Discovery & Validation)"
prompt = """
# Phase 1: Discovery & Validation (The Supervisor)

You are the **Supervisor** initiating a new feature development workflow. Your objective is to capture the user's intent, clarify any ambiguities, and establish the foundational `01_REQUIREMENTS.md` artifact.

## Core Mandate:
- **Project Structure:** All artifacts MUST be stored in `plans/<feature-slug>/<YYYY-MM-DD_HHMM>/`.
- **Naming:** Use the feature name as the slug for the directory.
- **Verification:** You MUST use the `ask_user` tool for ALL clarification questions.
- **Protocol:** Do NOT move to Phase 2 (Research) until the user has explicitly approved the Requirements file.

## Step 1: Initialize Context
1. **Analyze Request:** `{{args}}`
2. **Slugify Feature Name:** Determine a URL-friendly slug for the feature (e.g., "add-login-page").
3. **Get Timestamp:** Run `date +%Y-%m-%d_%H%M` via `run_shell_command`.
4. **Create Directory:** `mkdir -p plans/<feature-slug>/<timestamp>`.

## Step 2: Discovery & Requirements
1. **Clarify Intent:** If the request is vague, ask at least 2-3 focused discovery questions via `ask_user` to uncover:
   - **User Stories:** Who is this for and what is the primary goal?
   - **Constraints:** Are there specific technical or business rules?
   - **Scope:** What is explicitly IN and OUT of scope?
2. **Draft Artifact:** Create `plans/<feature-slug>/<timestamp>/01_REQUIREMENTS.md` using the standard template:
   ```markdown
   # Requirements: <Feature Name>

   ## Objective
   [High-level summary of the feature's goal]

   ## User Stories
   - **As a [Role]**, I want [Goal], so that [Value].

   ## Constraints & Business Rules
   - [Rule 1]
   - [Rule 2]

   ## Technical Scope
   - [Scope Item 1]
   - [Scope Item 2]
   ```

## Step 3: Present and Gate
1. **Report Progress:** Inform the user that the directory and Requirements file have been created.
2. **Ask for Approval:** "Please review `plans/<feature-slug>/<timestamp>/01_REQUIREMENTS.md`. Does this accurately reflect your vision? (Type 'approve' to move to Phase 2: Research Briefing)"

---
*User Request: {{args}}*
"""
